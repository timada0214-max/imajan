<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <meta name="theme-color" content="#14532d" />

    <title>IMAJAN｜麻雀成績管理</title>

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="app">
      <section class="login-screen">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">I</div>

          <h1 class="brand-name">IMAJAN</h1>

          <p class="brand-description">
            仲間内の麻雀リーグを、もっと簡単に。
          </p>
        </div>

        <div class="login-card">
          <div class="card-heading">
            <h2>ログイン</h2>
            <p>ニックネームとPINを入力してください</p>
          </div>

          <form id="login-form" novalidate>
            <div class="form-group">
              <label for="nickname">ニックネーム</label>

              <input
                id="nickname"
                name="nickname"
                type="text"
                placeholder="例：いまだ"
                autocomplete="username"
                maxlength="20"
              />

              <p id="nickname-error" class="field-error"></p>
            </div>

            <div class="form-group">
              <label for="pin">PIN</label>

              <div class="pin-field">
                <input
                  id="pin"
                  name="pin"
                  type="password"
                  placeholder="4桁の数字"
                  inputmode="numeric"
                  autocomplete="current-password"
                  maxlength="4"
                />

                <button
                  id="toggle-pin"
                  class="pin-toggle"
                  type="button"
                  aria-label="PINを表示する"
                >
                  表示
                </button>
              </div>

              <p id="pin-error" class="field-error"></p>
            </div>

            <p
              id="form-message"
              class="form-message"
              role="status"
              aria-live="polite"
            ></p>

            <button id="login-button" class="primary-button" type="submit">
              ログイン
            </button>
          </form>

          <div class="divider">
            <span>または</span>
          </div>

          <button id="signup-button" class="secondary-button" type="button">
            はじめて利用する
          </button>
        </div>

        <p class="login-note">
          身内で使うための、シンプルな麻雀成績管理ツールです。
        </p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
